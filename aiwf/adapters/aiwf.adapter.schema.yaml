version: v0.1
schema: aiwf.adapter

required_fields:
  - version
  - target_repo
  - status
  - adoption_state
  - source
  - adopted
  - local_boundary
  - forbidden_actions
  - write_gate
  - verification
  - rollback

status_values:
  - draft
  - evaluated
  - approved
  - deprecated

adoption_state_values:
  - draft_only
  - evaluated_not_adopted
  - approved_adopted
  - deprecated

field_semantics:
  status: "Adapter lifecycle state. Only status=approved can be active."
  adoption_state: "Machine-readable downstream adoption state. Draft and evidence records must not imply repo adoption."
  adopted: "Selected capability/kernel set declared by this adapter record. This field is not proof of downstream repo adoption unless status=approved and adoption_state=approved_adopted."
  source.adapter_created_at: "Date this adapter record was created. This is not an adoption date."
  source.last_reviewed_at: "Date this adapter record was last reviewed."

evaluation:
  description: "Optional. Records when and how the adapter was evaluated against repo source."
  required: false
  fields:
    status:
      type: string
      enum: [not_evaluated, evaluated]
      description: "Whether the adapter has been evaluated against repo source"
    last_evaluated:
      type: string
      format: date
      description: "Date of last evaluation (YYYY-MM-DD)"
    evaluated_against:
      type: list
      items: string
      description: "Source documents evaluated against (e.g. CLAUDE.md, AGENTS.md, repo file structure)"
    known_gaps:
      type: list
      items: string
      description: "Known gaps found during evaluation"
    re_evaluate_when:
      type: list
      items: string
      description: "Triggers for re-evaluation"

rules:
  - only_approved_adapter_is_active
  - unlisted_capability_is_not_adopted
  - local_repo_boundary_wins
  - adapter_record_is_not_approval_by_itself
