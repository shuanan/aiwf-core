name: Validate AIWF Core

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Run AIWF Core validation
        run: bash scripts/validate-aiwf-core.sh
